# NGINX Configuration for CESA WEB - Oracle VPS
# Archivo: /database/nginx_cesa.conf

server {
    listen 80;
    server_name cesa-api.unison.mx; # Reemplazar con tu dominio or IP

    # Redirección automática a HTTPS (Una vez configurado Certbot)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name cesa-api.unison.mx;

    # Certificados SSL (Certbot los generará aquí)
    # ssl_certificate /etc/letsencrypt/live/cesa-api.unison.mx/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cesa-api.unison.mx/privkey.pem;

    # Optimización de seguridad
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Proxy para el backend PHP (Si decidieras mover el backend al VPS)
    # location / {
    #     proxy_pass http://localhost:8000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # Acceso a logs para auditoría (CBIT-01)
    access_log /var/log/nginx/cesa_access.log;
    error_log /var/log/nginx/cesa_error.log;
}

